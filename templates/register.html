<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

/* ===== BACKGROUND ===== */
body {
    margin: 0;
    background: url("{{ url_for('static', filename='images/bg.jpg') }}") no-repeat center center fixed;
    background-size: cover;
    font-family: 'Segoe UI', sans-serif;
}

/* ===== OVERLAY ===== */
.overlay {
    background: rgba(0,0,0,0.4);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ===== GLASS CARD ===== */
.register-card {
    width: 450px;
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    animation: fadeIn 1s ease-in-out;
}

/* ===== LOGO ===== */
.logo {
    width: 85px;
    display: block;
    margin: 0 auto 15px auto;
}

/* ===== INPUT ===== */
.form-control, .form-select {
    background: rgba(255,255,255,0.85);
    border-radius: 8px;
}

/* ===== BUTTON ===== */
.btn-primary {
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    border: none;
}

.btn-primary:hover {
    transform: scale(1.05);
    transition: 0.3s;
}

/* ===== ANIMATION ===== */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Remove browser eye icon */
input[type="password"]::-ms-reveal,
input[type="password"]::-ms-clear {
    display: none;
}

</style>
</head>

<body>

<div class="overlay">
    <div class="card shadow-lg register-card">

        <!-- LOGO -->
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">

        <h4 class="text-center mb-3">📝 Student Registration</h4>
        <p class="text-center text-light mb-4">Create your account to raise grievances</p>

        <form method="POST">

            <!-- Student ID -->
            <div class="mb-3">
                <label class="text-white">Student ID</label>
                <input type="text" name="student_id" class="form-control" maxlength="15" required>
            </div>

            <!-- Name -->
            <div class="mb-3">
                <label class="text-white">Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="text-white">College Email</label>
                <input type="email" name="email" class="form-control"
                       pattern="^[a-zA-Z0-9._%+-]+@srmist\.edu\.in$"
                       title="Use college email only"
                       required>
            </div>

            <!-- Password -->
            <div class="mb-3 position-relative">
                <label class="text-white">Password</label>
                <input type="password" name="password" id="password" class="form-control pe-5" required>

                <i class="bi bi-eye-slash position-absolute"
                   id="togglePassword"
                   style="top: 38px; right: 15px; cursor: pointer; color:black;">
                </i>
            </div>

            <!-- Department -->
            <div class="mb-3">
                <label class="text-white">Department</label>
                <select name="course" class="form-select" required>
                    <option value="">-- Select Department --</option>
                    <option>CSE</option>
                    <option>CSE-AI/ML</option>
                    <option>CSE-Cyber Security</option>
                    <option>CSE-Data Science</option>
                    <option>CSE-Blockchain</option>
                    <option>CSE-IoT</option>
                    <option>CSE-Med Engineering</option>
                    <option>IT</option>
                    <option>AI</option>
                    <option>ECE</option>
                    <option>ECE-Data Science</option>
                    <option>EEE</option>
                    <option>Biotechnology</option>
                    <option>Biomedical Engineering</option>
                </select>
            </div>

            <!-- Year -->
            <div class="mb-3">
                <label class="text-white">Year</label>
                <select name="year" class="form-select" required>
                    <option value="">-- Select Year --</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </div>

            <!-- BUTTON -->
            <button type="submit" class="btn btn-primary w-100 mb-2">
                <i class="bi bi-person-plus"></i> Register
            </button>

        </form>

        <div class="text-center mt-3">
            <small class="text-light">
                Already have an account?
                <a href="/login" class="text-info">Login here</a>
            </small>
        </div>

    </div>
</div>

<!-- Password Toggle -->
<script>
const togglePassword = document.querySelector('#togglePassword');
const password = document.querySelector('#password');

togglePassword.addEventListener('click', function () {
    const type = password.type === 'password' ? 'text' : 'password';
    password.type = type;

    this.classList.toggle('bi-eye');
    this.classList.toggle('bi-eye-slash');
});
</script>

</body>
</html>
