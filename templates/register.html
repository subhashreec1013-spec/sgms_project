<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

   <style>
    body {
        margin: 0;
        background: url("{{ url_for('static', filename='images/bg.jpg') }}") no-repeat center center fixed;
        background-size: cover;
    }

    .overlay {
        background-color: rgba(255, 255, 255, 0.3);
        min-height: 100vh;   /* changed from 80vh */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .register-card {
        width: 420px;
        padding: 25px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
    }

    .logo {
        width: 80px;
        display: block;
        margin: 0 auto 15px auto;
    }

    /* Remove browser default eye icon */
    input[type="password"]::-ms-reveal,
    input[type="password"]::-ms-clear {
        display: none;
    }

    input[type="password"] {
        appearance: none;
    }
    </style>
</head>

<body>

<div class="overlay">
    <div class="card shadow-lg register-card">

        <!-- College Logo -->
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo mb-3">

        <h4 class="text-center mb-4">Student Registration</h4>

        <form method="POST">

            <!-- Student ID -->
            <div class="mb-3">
                <label>Student ID (15 characters)</label>
                <input type="text" name="student_id" class="form-control" maxlength="15" required>
            </div>

            <!-- Name -->
            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <!-- College Email -->
            <div class="mb-3">
                <label>College Email</label>
                <input type="email" name="email" class="form-control"
                       pattern="^[a-zA-Z0-9._%+-]+@srmist\.edu\.in$"
                       title="Use college email only (example@srmist.edu.in)"
                       required>
            </div>

            <!-- Password with Eye Icon -->
            <div class="mb-3 position-relative">
                <label>Password</label>
                <input type="password" name="password" id="password" class="form-control pe-5" required>
                
                <i class="bi bi-eye-slash position-absolute"
                   id="togglePassword"
                   style="top: 38px; right: 15px; cursor: pointer;">
                </i>
            </div>

            <!-- Department -->
            <div class="mb-3">
                <label>Select Department</label>
                <select name="course" class="form-select" required>
                    <option value="">-- Select Department --</option>
                    <option>CSE</option>
                    <option>CSE-AI/ML</option>
                    <option>CSE-Cyber Security</option>
                    <option>CSE-Data Science</option>
                    <option>CSE-Blockchain</option>
                    <option>CSE-IoT</option>
                    <option>CSE-Med Engineering</option>
                    <option>IT</option>
                    <option>AI</option>
                    <option>ECE</option>
                    <option>ECE-Data Science</option>
                    <option>EEE</option>
                    <option>Biotechnology</option>
                    <option>Biomedical Engineering</option>
                </select>
            </div>

            <!-- Year -->
            <div class="mb-3">
                <label>Year</label>
                <select name="year" class="form-select" required>
                    <option value="">-- Select Year --</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">Register</button>

        </form>

        <div class="text-center mt-3">
            <small>Already have an account? 
                <a href="/login">Login here</a>
            </small>
        </div>

    </div>
</div>

<!-- Password Toggle Script -->
<script>
const togglePassword = document.querySelector('#togglePassword');
const password = document.querySelector('#password');

togglePassword.addEventListener('click', function () {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);

    this.classList.toggle('bi-eye');
    this.classList.toggle('bi-eye-slash');
});
</script>

</body>
</html>
