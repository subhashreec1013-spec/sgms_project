<!DOCTYPE html>
<html>
<head>
    <title>Update Grievance Status</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

/* ===== BACKGROUND ===== */
body {
    background: url("{{ url_for('static', filename='images/bg.jpg') }}") no-repeat center center fixed;
    background-size: cover;
    font-family:'Segoe UI',sans-serif;
}

/* ===== OVERLAY ===== */
.overlay {
    background: rgba(0,0,0,0.4);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ===== GLASS CARD ===== */
.update-card {
    width: 420px;
    padding: 35px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
}

/* ===== INPUT ===== */
.form-select {
    background: rgba(255,255,255,0.85);
    border-radius: 8px;
}

/* ===== BUTTONS ===== */
.btn-success {
    background: linear-gradient(45deg,#00c853,#009624);
    border: none;
}

.btn-secondary {
    background: linear-gradient(45deg,#434343,#000);
    border: none;
}

.btn:hover {
    transform: scale(1.05);
    transition: 0.3s;
}

</style>

</head>

<body>

<div class="overlay">

    <div class="card shadow update-card">

        <h4 class="text-center mb-3">🔄 Update Status</h4>
        <p class="text-center text-light mb-4">Modify grievance progress</p>

        <form method="POST">

            <!-- STATUS -->
            <div class="mb-3">
                <label class="text-white">Select New Status</label>
                <select name="status" class="form-select" required>
                    <option value="">-- Select Status --</option>
                    <option>Pending</option>
                    <option>In Progress</option>
                    <option>Resolved</option>
                </select>
            </div>

            <!-- BUTTONS -->
            <button type="submit" class="btn btn-success w-100 mb-2">
                <i class="bi bi-check-circle"></i> Update Status
            </button>

            <a href="/admin_dashboard" class="btn btn-secondary w-100">
                <i class="bi bi-arrow-left"></i> Cancel
            </a>

        </form>

    </div>

</div>

</body>
</html>
