<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:'Segoe UI',sans-serif;
}

.navbar{
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card{
border-radius:12px;
}

.btn{
border-radius:8px;
}

.dashboard-title{
font-weight:600;
margin-bottom:20px;
}

</style>

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">SGMS</a>

    <div class="collapse navbar-collapse">

      <ul class="navbar-nav me-auto">

        <li class="nav-item">
            <a class="nav-link {% if request.path == '/dashboard' %}active fw-bold{% endif %}" href="/dashboard">
                Dashboard
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="/raise_grievance">
                Grievance Addressal
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="/my_grievances">
                My Grievances
            </a>
        </li>

      </ul>

      <span class="navbar-text text-white me-3">
          Welcome {{ name }}
      </span>

      <a href="/logout" class="btn btn-sm btn-danger">
          Logout
      </a>

    </div>
  </div>
</nav>

<!-- ================= DASHBOARD ================= -->

<div class="container mt-5">

<div class="card shadow p-4">

<div class="card-header bg-danger text-white">
<h4 class="mb-0">Student Dashboard</h4>
</div>

<hr>

<h5 class="mb-3">Student Information</h5>

<table class="table table-bordered">

<tr>
<th style="width:200px;">Name</th>
<td>{{ student[1] }}</td>
</tr>

<tr>
<th>Register Number</th>
<td>{{ student[0] }}</td>
</tr>

<tr>
<th>Department</th>
<td>{{ student[2] }}</td>
</tr>

<tr>
<th>Year</th>
<td>{{ student[3] }}</td>
</tr>

</table>

<hr>

<div class="row g-3">

<div class="col-md-6">
<a href="/raise_grievance" class="btn btn-primary w-100">
Raise New Grievance
</a>
</div>

<div class="col-md-6">
<a href="/my_grievances" class="btn btn-dark w-100">
View My Grievances
</a>
</div>

</div>

</div>

</div>

</body>
</html>
