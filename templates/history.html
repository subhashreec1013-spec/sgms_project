<!DOCTYPE html>
<html>
<head>
    <title>Grievance History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h4 class="mb-4">Grievance Timeline</h4>

        {% if history %}
            <ul class="list-group">
                {% for h in history %}
                <li class="list-group-item">
                    <strong>{{ h[0] }}</strong><br>
                    {{ h[1] }}<br>
                    <small class="text-muted">{{ h[2] }}</small>
                </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No history available.</p>
        {% endif %}

        <a href="/my_grievances" class="btn btn-secondary mt-3">Back</a>
    </div>

</div>

</body>
</html>
