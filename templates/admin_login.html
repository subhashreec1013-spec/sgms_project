<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            background: url("{{ url_for('static', filename='images/bg.jpg') }}") no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background-color: rgba(255, 255, 255, 0.3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 400px;
            padding: 30px;
            border-radius: 15px;
        }

        .logo {
            width: 80px;
            display: block;
            margin: auto;
        }
        /* Remove browser default eye icon */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }

        input[type="password"] {
            appearance: none;
        }
    </style>
</head>

<body>

<div class="overlay">
    <div class="card shadow login-card">

        <!-- Logo -->
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo mb-3">

        <h4 class="text-center mb-4">Admin Login</h4>

        <form method="POST">

            <!-- Username -->
            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <!-- Password -->
            <div class="mb-3 position-relative">
                <label>Password</label>
                <input type="password" name="password" id="password" class="form-control pe-5" required>
            <i class="bi bi-eye-slash position-absolute"
                   id="togglePassword"
                   style="top: 38px; right: 15px; cursor: pointer;">
            </i>
                
            </div>
            

            <button type="submit" class="btn btn-danger w-100">Login</button>

        </form>

    </div>
</div>
<!-- Toggle Password Script -->
<script>
const togglePassword = document.querySelector('#togglePassword');
const password = document.querySelector('#password');

togglePassword.addEventListener('click', function () {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    this.classList.toggle('bi-eye');
    this.classList.toggle('bi-eye-slash');
});
</script>

</body>
</html>
