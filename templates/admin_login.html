<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            background: url("{{ url_for('static', filename='images/bg.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            margin: 0;
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.4); /* same as other pages */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 400px;
            padding: 35px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255,255,255,0.3);
            animation: fadeIn 1s ease-in-out;
        }

        .logo {
            width: 90px;
            display: block;
            margin: auto;
        }

        .btn-admin {
            background: linear-gradient(45deg, #434343, #000000);
            color: white;
            border: none;
        }

        .btn-admin:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }

        input {
            background: rgba(255,255,255,0.8) !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* remove browser eye icon */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }
    </style>
</head>

<body>

<div class="overlay">
    <div class="card shadow login-card">

        <!-- LOGO -->
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo mb-3">

        <h4 class="text-center text-white mb-3">Admin Login</h4>
        <p class="text-center text-light mb-4">Authorized access only</p>

        <form method="POST">

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label text-white">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <!-- Password -->
            <div class="mb-3 position-relative">
                <label class="form-label text-white">Password</label>
                <input type="password" name="password" id="password" class="form-control pe-5" required>

                <i class="bi bi-eye-slash position-absolute"
                   id="togglePassword"
                   style="top: 38px; right: 15px; cursor: pointer; color:black;">
                </i>
            </div>

            <button type="submit" class="btn btn-admin w-100">Login</button>

        </form>

        <!-- Back to Home -->
        <div class="text-center mt-3">
            <a href="/" class="text-light">← Back to Home</a>
        </div>

    </div>
</div>

<!-- Password Toggle -->
<script>
const togglePassword = document.getElementById('togglePassword');
const password = document.getElementById('password');

togglePassword.addEventListener('click', function () {
    const type = password.type === 'password' ? 'text' : 'password';
    password.type = type;

    this.classList.toggle('bi-eye');
    this.classList.toggle('bi-eye-slash');
});
</script>

</body>
</html>
