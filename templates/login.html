<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            background: url("{{ url_for('static', filename='images/bg.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            margin: 0;
        }

        .overlay {
            background-color: rgba(255, 255, 255, 0.3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 400px;
            padding: 35px;
            border-radius: 15px;
        }

        .logo {
            width: 90px;
            display: block;
            margin: auto;
        }

        /* Remove browser default eye icon */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }

        input[type="password"] {
            appearance: none;
        }
    </style>
</head>

<body>

<div class="overlay">
    <div class="card shadow login-card">

        <!-- College Logo -->
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo mb-3">

        <h4 class="text-center mb-4">Student Login</h4>

        <form method="POST">

            <!-- Student ID -->
            <div class="mb-3">
                <label class="form-label">Student ID</label>
                <input type="text" name="student_id" class="form-control" required>
            </div>

            <!-- Password -->
            <div class="mb-3 position-relative">
                <label class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-control pe-5" required>

                <i class="bi bi-eye-slash position-absolute"
                   id="togglePassword"
                   style="top: 38px; right: 15px; cursor: pointer;">
                </i>
            </div>

            <button type="submit" class="btn btn-primary w-100">Login</button>

        </form>

        <div class="text-center mt-3">
            <small>Don't have an account?
                <a href="/register">Register here</a>
            </small>
        </div>

    </div>
</div>

<!-- Password Toggle Script -->
<script>
const togglePassword = document.getElementById('togglePassword');
const password = document.getElementById('password');

togglePassword.addEventListener('click', function () {
    const type = password.type === 'password' ? 'text' : 'password';
    password.type = type;

    this.classList.toggle('bi-eye');
    this.classList.toggle('bi-eye-slash');
});
</script>

</body>
</html>
